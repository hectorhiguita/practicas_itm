# Configuración de NGINX como Load Balancer para Practicas ITM
# Usar con: docker-compose -f docker-compose.prod.yml up -d

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Upstream - Define los servidores backend
    upstream practicas_api {
        # Algoritmo de balanceo: round-robin (por defecto)
        server api_1:5000 weight=1 max_fails=3 fail_timeout=30s;
        server api_2:5000 weight=1 max_fails=3 fail_timeout=30s;
        server api_3:5000 weight=1 max_fails=3 fail_timeout=30s;
        
        # Mantener conexiones vivas
        keepalive 32;
    }

    # Server
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Redireccionar HTTP a HTTPS (descomentar si usas SSL)
        # return 301 https://$server_name$request_uri;

        # Proxy settings
        location / {
            proxy_pass http://practicas_api;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Connection settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Health check endpoint (sin logging)
        location /api/health {
            proxy_pass http://practicas_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Sin logs para no saturar
            access_log off;
        }

        # Estadísticas de NGINX (descomentar solo en desarrollo)
        # location /nginx_status {
        #     stub_status on;
        #     access_log off;
        #     allow 127.0.0.1;
        #     allow 172.16.0.0/12;  # Docker network
        #     deny all;
        # }

        # Health check del LB mismo
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Deny access to sensitive locations
        location ~ /\.env {
            deny all;
        }
    }

    # SSL/TLS Configuration (descomentar si usas HTTPS)
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name tu-dominio.com;
    #
    #     # SSL certificates (generar con Let's Encrypt)
    #     ssl_certificate /etc/nginx/certs/cert.pem;
    #     ssl_certificate_key /etc/nginx/certs/key.pem;
    #     ssl_trusted_certificate /etc/nginx/certs/chain.pem;
    #
    #     # SSL settings
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #
    #     # Proxy settings (igual al server anterior)
    #     location / {
    #         proxy_pass http://practicas_api;
    #         # ... headers ...
    #     }
    # }

    # Redirect HTTP to HTTPS (descomentar si usas SSL)
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name tu-dominio.com;
    #     return 301 https://$server_name$request_uri;
    # }
}
