version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practicas_itm_db
    environment:
      POSTGRES_USER: practicas_user
      POSTGRES_PASSWORD: practicas_password
      POSTGRES_DB: practicas_itm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U practicas_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practicas_itm_api
    ports:
      - "5000:5000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: practicas_itm
      DB_USER: practicas_user
      DB_PASSWORD: practicas_password
      FLASK_ENV: development
      FLASK_DEBUG: True
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: python main.py

volumes:
  postgres_data:
    driver: local
