<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test Programas API</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .program { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .program h3 { margin: 0; color: #1B1464; }
    </style>
</head>
<body>
    <h1>Test: Cargando Programas</h1>
    <div id="resultado"></div>

    <script>
        async function cargarProgramas() {
            try {
                const res = await fetch('/api/programas/');
                const data = await res.json();
                const programas = data.data || [];
                
                console.log('Total programas:', programas.length);
                console.log('Primero programa:', programas[0]);
                
                const html = `
                    <p><strong>Total cargados: ${programas.length}</strong></p>
                    ${programas.slice(0, 5).map(p => `
                        <div class="program">
                            <h3>${p.nombre}</h3>
                            <p>Nivel: ${p.nivel}</p>
                            <p>Duración: ${p.duracion}</p>
                            <p>Facultad: ${p.facultad_nombre}</p>
                        </div>
                    `).join('')}
                `;
                
                document.getElementById('resultado').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('resultado').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        cargarProgramas();
    </script>
</body>
</html>
